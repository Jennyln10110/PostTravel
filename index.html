<!DOCTYPE html>

<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel=stylesheet href="styles.css">
    <title>Travel Postcards</title>
</head>

<body>
    <div class="intro-card">
        <h1>Travel Postcards!</h1>
        <p>This is where you create a mini postcard to save into an album. Share on social media the cool places you've been!</p>
    </div>
    <div>
        <section>
            <label id="img-card">Upload a photo from your adventure!</label> <input type="file" id="upload" accept="image/*">
        </section>
        <br>
        <div id="test1">
            <section id="postcard">
                <div id="imagesection">
                    <img id="preview">
                </div>  
                <div id="contentcard">
                    <div class="title-row">
                        <input type="text" class="title-content" placeholder="Title of Adventure">
                        <div class="stamp"><img src="images/strawberry stamp.jpg"></div>
                    </div>
                    <textarea class="content" placeholder="Enter your adventure story"></textarea>
                </div>          
            </section>   
        </div>
        <br>
    </div>
    
    <button id="save-btn">Save as Postcard</button>  <!-- moved inside the div -->

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script> <!--This is an external source that helps screenshot the postcard-->
    <script src="script.js"></script>
</body>

</html>
