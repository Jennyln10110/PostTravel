<!DOCTYPE html>

<html>
<head>
<link rel=stylesheet href="styles.css">
<title>Travel Postcards</title>
</head>

<body>
    <div class="intro-card">
        <h1>Travel Postcards!</h1>
        <p>This is where you create a mini postcard to save into an album. Share on social media the cool places you've been!</p>
    </div>
    <div id="postcard">
        <section class="front-card">
            <label id="img-card">Upload a photo from your adventure!</label><br>
            <input type="file" id="upload" accept="image/*">
        </section>
        <hr>
        <section id="contentcard">
            <img id="preview">            
            <input type="text" class="title-content" placeholder="Title of Adventure">
            <br><br>
            <input type="text" class="content" placeholder="Enter your adventure story">
        </section>        
    </div>
    <button id="save-btn">Save as Postcard</button>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script> <!--This is an external source that helps screenshot the postcard-->
    <script src="script.js"></script>
</body>

</html>
